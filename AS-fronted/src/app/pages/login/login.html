<main class="xp-desktop login-page">
<div id="loginDiv" class="xp-window xp-window--auth" cdkDrag>
  <div class="xp-titlebar">
    <h2>Fazer Login</h2>
    <div class="xp-window-controls" aria-hidden="true">
      <span class="xp-window-control">_</span>
      <span class="xp-window-control">[ ]</span>
      <span class="xp-window-control xp-window-control--close">X</span>
    </div>
  </div>

  <div class="xp-body">
  <form class="xp-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
      <small class="xp-error">
        Por favor, insira um e-mail válido.
      </small>
    }
    <input type="email" formControlName="email" placeholder="E-mail" />
    <input type="password" formControlName="password" placeholder="Senha" />

    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
  </form>
  <nav class="xp-links">
    <a routerLink="/cadastro">Não tem conta? Cadastre-se</a>
    <span>|</span>
    <a routerLink="/home">Home</a>
  </nav>
  </div>
</div>

<app-home id="appHome"></app-home>
</main>
